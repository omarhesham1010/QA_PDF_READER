<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF QA Teaching System</title>
  <meta name="description"
    content="Convert PDF exam sheets with MCQ questions into a structured dataset for teachers." />

  <!-- pdf.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- jszip CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- FileSaver CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ========== TOP BAR ========== -->
  <header id="topbar">
    <!-- Brand -->
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
        <polyline points="10 9 9 9 8 9" />
      </svg>
      PDF QA System
    </div>

    <!-- File name -->
    <span id="fileName">لم يتم تحميل ملف</span>

    <!-- Upload button -->
    <button id="uploadBtn" onclick="document.getElementById('pdfInput').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      رفع PDF
    </button>
    <input type="file" id="pdfInput" accept=".pdf" />

    <!-- Header Stats -->
    <div id="header-stats" style="display: none; align-items: center; gap: 15px; margin-right: 20px; padding: 0 15px; border-right: 1px solid var(--border); height: 30px;">
      <div class="header-stat">
        <span class="label">الأسئلة:</span>
        <span id="header-stat-total" class="value">0</span>
      </div>
      <div class="header-stat">
        <span class="label">المجاب:</span>
        <span id="header-stat-answered" class="value">0</span>
      </div>
      <div id="header-completion-pct" class="value">0%</div>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" onclick="toggleTheme()" title="تبديل الوضع الليلي/النهاري">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle class="sun" cx="12" cy="12" r="5"></circle>
        <line class="sun" x1="12" y1="1" x2="12" y2="3"></line>
        <line class="sun" x1="12" y1="21" x2="12" y2="23"></line>
        <line class="sun" x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line class="sun" x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line class="sun" x1="1" y1="12" x2="3" y2="12"></line>
        <line class="sun" x1="21" y1="12" x2="23" y2="12"></line>
        <line class="sun" x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line class="sun" x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        <path class="moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <!-- Export button -->
    <button id="exportBtn" disabled onclick="exportZip()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      تصدير ZIP
    </button>
  </header>

  <!-- ========== LAYOUT ========== -->
  <div id="layout">

    <!-- CENTER: Question viewer -->
    <main id="center">

      <!-- Progress -->
      <div id="progress-container">
        <span id="progress-label">جاري المعالجة...</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar"></div>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <h2>ابدأ برفع ملف PDF</h2>
        <p>قم برفع ورقة الأسئلة بصيغة PDF وسيتم اكتشاف الأسئلة تلقائياً.</p>
      </div>

      <!-- Question viewer -->
      <div id="question-viewer">
        <span id="q-title">السؤال 1</span>
        <div id="q-image-wrap">
          <img id="q-image" src="" alt="صورة السؤال" />
        </div>

        <!-- Manual crop adjustment -->
        <div id="crop-controls">
          <span class="crop-label">ضبط القص:</span>
          <div class="crop-input-wrap">
            <label>أعلى</label>
            <input type="number" id="cropTop" value="0" step="5" />
          </div>
          <div class="crop-input-wrap">
            <label>أسفل</label>
            <input type="number" id="cropBottom" value="0" step="5" />
          </div>
          <div class="crop-input-wrap">
            <label>يسار</label>
            <input type="number" id="cropLeft" value="0" step="5" />
          </div>
          <div class="crop-input-wrap">
            <label>يمين</label>
            <input type="number" id="cropRight" value="0" step="5" />
          </div>
          <button id="applyCropBtn" onclick="applyManualCrop()">تطبيق</button>
        </div>
      </div>

    </main>

    <!-- RIGHT PANEL: Question Navigator & Answer selection -->
    <aside id="right-panel">

      <!-- Question Navigation -->
      <div id="navigator-section">
        <div class="panel-section-title">قائمة الأسئلة</div>
        <div id="question-list">
          <!-- Question buttons injected here -->
        </div>
      </div>

      <!-- Answer selection section -->
      <div>
        <div class="panel-section-title">الإجابة الصحيحة</div>
        <div id="answer-options">
          <label class="answer-option" id="opt-A">
            <input type="radio" name="answer" value="A" onchange="selectAnswer('A')" />
            <div class="answer-letter">A</div>
            <span class="answer-option-text">خيار A</span>
            <button class="edit-opt-btn" onclick="enableOptionEdit(event, 'A')" title="تعديل النص">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
          </label>
          <label class="answer-option" id="opt-B">
            <input type="radio" name="answer" value="B" onchange="selectAnswer('B')" />
            <div class="answer-letter">B</div>
            <span class="answer-option-text">خيار B</span>
            <button class="edit-opt-btn" onclick="enableOptionEdit(event, 'B')" title="تعديل النص">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
          </label>
          <label class="answer-option" id="opt-C">
            <input type="radio" name="answer" value="C" onchange="selectAnswer('C')" />
            <div class="answer-letter">C</div>
            <span class="answer-option-text">خيار C</span>
            <button class="edit-opt-btn" onclick="enableOptionEdit(event, 'C')" title="تعديل النص">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
          </label>
          <label class="answer-option" id="opt-D">
            <input type="radio" name="answer" value="D" onchange="selectAnswer('D')" />
            <div class="answer-letter">D</div>
            <span class="answer-option-text">خيار D</span>
            <button class="edit-opt-btn" onclick="enableOptionEdit(event, 'D')" title="تعديل النص">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
          </label>
        </div>
      </div>

      <!-- Stats section (Removed from here, moved to header) -->

      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <label class="debug-toggle" style="display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; user-select: none;">
          <input type="checkbox" id="debugModeCheckbox" onchange="toggleDebugMode()" style="accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer;" />
          وضع التصحيح (Debug)
        </label>
      </div>
    </aside>

  </div>

  <!-- Hidden canvas for PDF rendering -->
  <canvas id="pdf-canvas"></canvas>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- ========== JAVASCRIPT ========== -->
  <script src="js/script.js"></script>
</body>

</html>
